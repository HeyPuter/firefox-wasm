<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gecko.js — chrome demo</title>
  </head>
  <body>
    <section id="splash" aria-live="polite">
      <div id="splash-shell" class="splash-shell" data-phase="loading">
        <article class="project-card" aria-labelledby="project-title">
          <img class="project-logo" src="logo.webp" alt="gecko.js" />
          <h1 id="project-title" class="splash-title">
            Firefox in WebAssembly
          </h1>
          <p class="project-copy">
            This is the gecko engine compiled to WebAssembly, running the actual
            firefox UI in a web browser. All js execution and rendering is done
            inside webassembly, instead of the host browser.
          </p>
          <div class="project-facts" aria-label="Project highlights">
            <!--<div class="fact">
              <strong>Assets</strong>
              <span>Cached locally in OPFS after preparation.</span>
            </div>
            <div class="fact">
              <strong>Engine</strong>
              <span>Firefox/Gecko compiled to WebAssembly.</span>
            </div>
            <div class="fact">
              <strong>Network</strong>
              <span>Tabs load web content through a Wisp server.</span>
            </div>-->
          </div>
        </article>

        <div id="stage-card" class="stage-card" data-phase="loading">
          <section
            class="phase-section phase-loading"
            aria-label="Preparing browser assets"
          >
            <p class="phase-kicker">Phase 1</p>
            <h2 class="phase-title">Preparing browser files</h2>
            <p id="splash-status" class="splash-status">
              Preparing chrome assets
            </p>
            <div
              class="progress-track"
              role="progressbar"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
            >
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="progress-meta">
              <span id="progress-phase">Checking</span>
              <span id="progress-percent">0%</span>
            </div>
          </section>

          <section
            class="phase-section phase-ready"
            aria-label="Launch options"
          >
            <div class="splash-controls">
              <label class="option-card">
                <input type="checkbox" id="opt-gpu" />
                <span class="option-copy">
                  <strong>Use GPU acceleration</strong>
                  <span>Uses webgl based rendering for web contents</span>
                </span>
              </label>
              <label class="option-card">
                <input type="checkbox" id="opt-jit" />
                <span class="option-copy">
                  <strong>Enable JIT</strong>
                  <span>Experimental JS -> WASM JIT. Will be buggy</span>
                </span>
              </label>
              <label class="wisp-field">
                <span>Wisp server</span>
                <input
                  type="text"
                  id="opt-wisp"
                  spellcheck="false"
                  autocomplete="off"
                  aria-label="Wisp server"
                />
              </label>
            </div>
            <div class="splash-actions">
              <button id="start-btn" type="button" class="start-btn">
                Start
              </button>
            </div>
          </section>

          <section
            class="phase-section phase-console"
            aria-label="Startup console"
          >
            <div
              id="console-output"
              class="console-box"
              role="log"
              aria-label="Startup console output"
            ></div>
          </section>
        </div>
      </div>
    </section>
    <canvas id="screen" width="1024" height="768" tabindex="0"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
