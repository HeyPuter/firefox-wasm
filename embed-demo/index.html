<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>libxul.js — embed demo</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    header { padding: 8px 12px; background: #f3f3f3; border-bottom: 1px solid #ddd; }
    header p { margin: 0 0 6px; }
    #url {
      width: 100%; box-sizing: border-box; font: inherit;
      padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px;
    }
    #screen { display: block; border: 1px solid #ccc; image-rendering: pixelated; outline: none; }
    #controls {
      padding: 8px 12px; background: #f3f3f3; border-top: 1px solid #ddd;
      display: flex; flex-wrap: wrap; gap: 8px 18px; align-items: center; font-size: 13px;
    }
    #controls label { display: inline-flex; gap: 5px; align-items: center; }
    #wisp { font: inherit; padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; width: 300px; }
    #controls .hint { color: #888; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <p>libxul.js — Gecko (Firefox engine) in WebAssembly. Type a URL and press Enter.</p>
    <input id="url" placeholder="example.com · about:blank · data:text/html,…" />
  </header>
  <canvas id="screen" width="800" height="600" tabindex="0"></canvas>
  <section id="controls">
    <label>WISP proxy <input id="wisp" type="text" spellcheck="false" /></label>
    <label><input type="checkbox" id="gpu" /> GPU acceleration</label>
    <label><input type="checkbox" id="jit" /> JIT (wasm)</label>
    <span class="hint">engine options apply on reload</span>
  </section>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
