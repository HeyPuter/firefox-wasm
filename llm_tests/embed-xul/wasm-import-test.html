<!doctype html>
<html><head><meta charset="utf-8"><title>wasm import test</title></head>
<body style="font:15px monospace;padding:12px">
<div id="log">running…</div>
<script>
function log(s){document.getElementById('log').textContent=s;document.title=s;}
// add (no imports): (func (export "add") (param i32 i32) (result i32) i32.add)
var addBytes = new Uint8Array([
  0,97,115,109, 1,0,0,0,
  1,7, 1, 96,2,127,127,1,127,
  3,2, 1,0,
  7,7, 1, 3,97,100,100, 0,0,
  10,9, 1, 7,0, 32,0,32,1,106,11
]);
// import env.dbl(i32)->i32; export calc(x) = dbl(x) + 1
var calcBytes = new Uint8Array([
  0,97,115,109, 1,0,0,0,
  1,6, 1, 96,1,127,1,127,
  2,11, 1, 3,101,110,118, 3,100,98,108, 0,0,
  3,2, 1,0,
  7,8, 1, 4,99,97,108,99, 0,1,
  10,11, 1, 9,0, 32,0, 16,0, 65,1, 106, 11
]);
(async function(){
  try {
    var r1 = await WebAssembly.instantiate(addBytes, {});
    var addOk = r1.instance.exports.add(40, 2);   // expect 42

    var seen = -1;
    var r2 = await WebAssembly.instantiate(calcBytes, {
      env: { dbl: function(x){ seen = x; return x * 10; } }
    });
    var calc = r2.instance.exports.calc(5);        // dbl(5)=50 -> +1 = 51

    var ok = (addOk === 42) && (seen === 5) && (calc === 51);
    log((ok ? 'WASM_IMPORT_OK' : 'WASM_IMPORT_FAIL') +
        ' add=' + addOk + ' importArg=' + seen + ' calc=' + calc);
  } catch(e){ log('WASM_THROW ' + (e&&e.message?e.message:e)); }
})();
</script>
</body></html>
