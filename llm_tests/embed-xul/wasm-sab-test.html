<!doctype html>
<html><head><meta charset="utf-8"><title>SAB test</title></head>
<body style="font:14px monospace;padding:12px;white-space:pre">
<div id="log">running…</div>
<script>
function done(s){document.getElementById('log').textContent=s;document.title=s.split('\n')[0];}
var R = [];
R.push('crossOriginIsolated = ' + self.crossOriginIsolated);
R.push('typeof SharedArrayBuffer = ' + typeof SharedArrayBuffer);
try {
  var sab = new SharedArrayBuffer(16);
  var ia = new Int32Array(sab);
  Atomics.store(ia, 0, 42);
  Atomics.add(ia, 0, 1);
  var v = Atomics.load(ia, 0);
  R.push((v === 43 ? 'SAB_OK' : 'SAB_BAD') + ' Atomics result=' + v +
         ' byteLength=' + sab.byteLength);
} catch (e) {
  R.push('SAB_ERR ' + (e && e.message ? e.message : e));
}
done(R.join('\n'));
</script>
</body></html>
