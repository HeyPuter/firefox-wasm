<!doctype html>
<html><head><meta charset="utf-8"><title>wasm all-paths test</title></head>
<body style="font:13px monospace;padding:12px;white-space:pre">
<div id="log">running…</div>
<script>
function done(s){document.getElementById('log').textContent=s;document.title=s.split('\n')[0];}
var addBytes = new Uint8Array([
  0,97,115,109, 1,0,0,0, 1,7, 1, 96,2,127,127,1,127, 3,2, 1,0,
  7,7, 1, 3,97,100,100, 0,0, 10,9, 1, 7,0, 32,0,32,1,106,11
]);
(async function(){
  var R = [];
  function chk(name, cond){ R.push((cond?'OK  ':'FAIL')+' '+name); }
  try {
    // A: instantiate(bytes)
    var a = await WebAssembly.instantiate(addBytes, {});
    chk('instantiate(bytes)', a.instance.exports.add(40,2)===42);

    // B: instantiateStreaming(fetch)
    var b = await WebAssembly.instantiateStreaming(fetch('wasm-add.wasm'), {});
    chk('instantiateStreaming', b.instance.exports.add(20,22)===42);

    // C: compileStreaming -> new Instance(module)
    var cm = await WebAssembly.compileStreaming(fetch('wasm-add.wasm'));
    var ci = new WebAssembly.Instance(cm, {});
    chk('compileStreaming + new Instance', ci.exports.add(1,41)===42);

    // D: compile(bytes) -> instantiate(module)
    var dm = await WebAssembly.compile(addBytes);
    var di = await WebAssembly.instantiate(dm, {});
    chk('compile + instantiate(module)', di.exports.add(2,40)===42);

    // E: new Module + new Instance
    var em = new WebAssembly.Module(addBytes);
    var ei = new WebAssembly.Instance(em, {});
    chk('new Module + new Instance', ei.exports.add(30,12)===42);

    var pass = R.every(function(s){ return s.indexOf('OK')===0; });
    done((pass?'ALL_PASS':'SOME_FAIL')+'\n'+R.join('\n'));
  } catch(e){ done('THROW '+(e&&e.message?e.message:e)+'\n'+R.join('\n')); }
})();
</script>
</body></html>
