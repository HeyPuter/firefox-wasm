<!doctype html>
<html>
<head><meta charset="utf-8"><title>gltest</title></head>
<body style="margin:0;background:#222">
  <canvas id="screen" width="800" height="600"
          style="display:block;background:#000"></canvas>
  <pre id="log" style="color:#0f0;font:12px monospace"></pre>
  <script>
    var Module = {
      canvas: document.getElementById('screen'),
      print: (s) => { document.getElementById('log').textContent += s + '\n'; console.log(s); },
      printErr: (s) => { console.log('[err]', s); },
    };
  </script>
  <script src="gltest.js"></script>
</body>
</html>
