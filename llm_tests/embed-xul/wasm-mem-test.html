<!doctype html>
<html><head><meta charset="utf-8"><title>wasm memory test</title></head>
<body style="font:13px monospace;padding:12px;white-space:pre">
<div id="log">running…</div>
<script>
function done(s){document.getElementById('log').textContent=s;document.title=s.split('\n')[0];}
// imports env.memory; exports store(addr,val) [i32.store8] and load(addr)->i32 [i32.load8_u]
var memBytes = new Uint8Array([
  0,97,115,109, 1,0,0,0,
  1,11, 2, 96,2,127,127,0, 96,1,127,1,127,
  2,15, 1, 3,101,110,118, 6,109,101,109,111,114,121, 2,0,1,
  3,3, 2, 0,1,
  7,16, 2, 5,115,116,111,114,101,0,0, 4,108,111,97,100,0,1,
  10,19, 2, 9,0,32,0,32,1,58,0,0,11, 7,0,32,0,45,0,0,11
]);
(async function(){
  var R = [];
  function chk(n,c){ R.push((c?'OK  ':'FAIL')+' '+n); }
  try {
    var mem = new WebAssembly.Memory({ initial: 1 });
    chk('new Memory has buffer', mem.buffer && mem.buffer.byteLength === 65536);

    var u8 = new Uint8Array(mem.buffer);
    u8[10] = 42;                       // guest writes before instantiate

    var inst = (await WebAssembly.instantiate(memBytes, { env: { memory: mem } })).instance;

    var loaded = inst.exports.load(10);   // host should see guest's write (42)
    chk('guest->host (load sees 42)', loaded === 42);

    inst.exports.store(20, 99);           // host writes mem[20] = 99
    var rb = new Uint8Array(mem.buffer)[20];
    chk('host->guest (read back 99)', rb === 99);

    // a second round to confirm the cached view also tracks
    inst.exports.store(10, 7);
    chk('host->guest (cached view)', u8[10] === 7);

    var pass = R.every(function(s){ return s.indexOf('OK')===0; });
    done((pass?'MEM_PASS':'MEM_FAIL')+'\n'+R.join('\n'));
  } catch(e){ done('MEM_THROW '+(e&&e.message?e.message:e)+'\n'+R.join('\n')); }
})();
</script>
</body></html>
