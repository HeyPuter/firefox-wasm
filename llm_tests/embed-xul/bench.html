<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gecko-wasm perf benchmark</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.4 system-ui, sans-serif; color: #1a1a2e; background: #f4f5f7; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: linear-gradient(90deg, #5865f2, #404eed); color: #fff; }
  header h1 { font-size: 16px; margin: 0; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: #2b2d31; color: #dbdee1; padding: 8px; }
  .sidebar .item { display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    border-radius: 6px; margin-bottom: 2px; }
  .sidebar .item:hover { background: #3a3c41; }
  .sidebar .avatar { width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #f59e0b, #ef4444); flex: 0 0 auto; }
  main { flex: 1; padding: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .card { background: #fff; border: 1px solid #e3e5e8; border-radius: 8px; padding: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card h3 { margin: 0 0 6px; font-size: 14px; }
  .card p { margin: 0 0 8px; color: #4e5058; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
    background: #e7f3ff; color: #1d6fd6; }
  .bar { height: 6px; border-radius: 3px; background: #ebedef; overflow: hidden; margin-top: 8px; }
  .bar > i { display: block; height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); }
  #result { font: 13px/1.5 ui-monospace, monospace; white-space: pre-wrap;
    padding: 12px; background: #111; color: #5af78e; border-radius: 8px; margin: 16px; }
</style>
</head>
<body>
<header><h1>gecko-wasm benchmark</h1><span class="badge" id="phase">booting</span></header>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main><div class="grid" id="grid"></div></main>
</div>
<pre id="result">running…</pre>
<script>
  // ---- DOM build: many styled nodes -> stresses style resolution + layout + paint.
  var t0 = Date.now();
  var sidebar = document.getElementById('sidebar');
  var sb = '';
  for (var i = 0; i < 80; i++) {
    sb += '<div class="item"><span class="avatar"></span><span>channel-' + i + '</span></div>';
  }
  sidebar.innerHTML = sb;
  var grid = document.getElementById('grid');
  var cg = '';
  for (var c = 0; c < 240; c++) {
    var pct = (c * 37) % 100;
    cg += '<div class="card"><h3>Item ' + c + '</h3>' +
      '<p>Lorem ipsum dolor sit amet consectetur adipiscing elit ' + (c * 7 % 13) + '.</p>' +
      '<span class="badge">tag-' + (c % 9) + '</span>' +
      '<div class="bar"><i style="width:' + pct + '%"></i></div></div>';
  }
  grid.innerHTML = cg;
  var tDom = Date.now() - t0;

  // ---- Pure-JS compute: exercises the interpreter (loops, calls, property access,
  // arrays, objects, strings, JSON) the way framework/app code does.
  function jsWork() {
    var s0 = Date.now();
    // 1. numeric loop + math
    var acc = 0;
    for (var i = 0; i < 800000; i++) { acc += (i * 31 + 7) % 1000; acc ^= (acc << 1); }
    // 2. array of objects: build, sort, map, filter, reduce
    var arr = [];
    for (var j = 0; j < 20000; j++) arr.push({ id: j, k: (j * 2654435761) >>> 0, name: 'n' + j });
    arr.sort(function (a, b) { return a.k - b.k; });
    var mapped = arr.map(function (o) { return o.k & 0xffff; });
    var filtered = mapped.filter(function (v) { return (v & 1) === 0; });
    var sum = filtered.reduce(function (a, v) { return a + v; }, 0);
    // 3. string building + JSON round-trip
    var parts = [];
    for (var s = 0; s < 5000; s++) parts.push('{"i":' + s + ',"v":"x' + (s % 97) + '"}');
    var json = '[' + parts.join(',') + ']';
    var parsed = JSON.parse(json);
    var restr = JSON.stringify(parsed);
    // 4. recursion
    function fib(n) { return n < 2 ? n : fib(n - 1) + fib(n - 2); }
    var f = fib(28);
    return { ms: Date.now() - s0, acc: acc, sum: sum, len: restr.length, fib: f };
  }
  var r = jsWork();

  document.getElementById('phase').textContent = 'done';
  document.getElementById('result').textContent =
    'DOM build: ' + tDom + ' ms\n' +
    'JS work:   ' + r.ms + ' ms\n' +
    'checks: acc=' + r.acc + ' sum=' + r.sum + ' jsonLen=' + r.len + ' fib28=' + r.fib + '\n' +
    'TOTAL script: ' + (Date.now() - t0) + ' ms';
  window.__benchResult = { domMs: tDom, jsMs: r.ms, totalMs: Date.now() - t0 };
  // Expose for the harness to read out of the rendered document.
  document.title = 'BENCH domMs=' + tDom + ' jsMs=' + r.ms + ' totalMs=' + (Date.now() - t0);
</script>
</body>
</html>
