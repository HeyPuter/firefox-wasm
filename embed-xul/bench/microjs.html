<!doctype html>
<html><head><meta charset="utf-8"><title>microjs bench</title></head>
<body>
<h1>microjs</h1>
<pre id="out">running…</pre>
<script src="microjs.js"></script>
<script>
  // Run after load so timing isn't mixed with parse. Report back to the bench
  // server (same origin, reached over WISP). The engine's continuous event-loop
  // pump runs the timeout + the fetch.
  function go() {
    var results = globalThis.MICRO_BENCH();
    document.getElementById('out').textContent = JSON.stringify(results, null, 2);
    // POST the result; keepalive-ish: retry a couple of times if the first send
    // races the engine's networking bring-up.
    function send(n) {
      fetch('/bench-result', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bench: 'microjs', ua: navigator.userAgent, results: results }),
      }).catch(function () { if (n > 0) setTimeout(function () { send(n - 1); }, 300); });
    }
    send(5);
  }
  setTimeout(go, 50);
</script>
</body></html>
