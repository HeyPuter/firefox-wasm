<!doctype html><html><head><meta charset=utf-8><title>start</title></head><body>
<script>
// N-way polymorphic GetProp IC test. readx() is a NON-mutating function (Mode V)
// whose single GetProp site (o.x) sees several receiver shapes. 4 shapes fit the
// 4-way IC exactly; a 5th forces eviction -- the shape guard must keep it sound.
function A(){this.x=1;} function B(){this.x=2;} function C(){this.x=3;}
function D(){this.x=4;} function E(){this.x=5;}
function readx(o){ return o.x; }                 // Mode V N-way GetProp
function sumAll(a){ var s=0; for(var i=0;i<a.length;i++){ s+=readx(a[i]); } return s; }

var arr=[];
for(var i=0;i<1000;i++){ var k=i%4; arr.push(k==0?new A():k==1?new B():k==2?new C():new D()); }
for(var w=0;w<3000;w++){ sumAll(arr); }           // warm the JIT
var t=performance.now();
var s=0; for(var r=0;r<200;r++){ s=sumAll(arr); }
var ms=performance.now()-t;
var ok4 = (s===2500);                             // 250 blocks x (1+2+3+4)

var arr5=[];
for(var i=0;i<1000;i++){ var k=i%5; arr5.push(k==0?new A():k==1?new B():k==2?new C():k==3?new D():new E()); }
for(var w=0;w<3000;w++){ sumAll(arr5); }
var s5=sumAll(arr5);                               // 200 blocks x (1+2+3+4+5)
var ok5=(s5===3000);

document.title="POLY ok4="+ok4+" s="+s+" ok5="+ok5+" s5="+s5+" polyms="+ms.toFixed(1);
</script></body></html>
