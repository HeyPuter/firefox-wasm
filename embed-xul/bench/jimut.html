<!doctype html><html><head><meta charset=utf-8><title>start</title></head><body>
<script>
// Mode VS `this` + method-call + mutation: add() reads/writes this.sum (r/m/w on
// `this`); run() calls this.add() in a loop. Tests FunctionThis + method calls +
// SetProp-on-this soundness (exactly-once accumulation).
function Node(){ this.sum = 0; }
Node.prototype.add = function(x){ this.sum = this.sum + x; return this.sum; };
Node.prototype.run = function(k){ var t=0; for(var i=0;i<k;i++){ t = this.add(i); } return t; };
// warm up add (and run) past the JIT threshold
for(var w=0;w<400;w++){ var nn=new Node(); nn.run(20); }
// correctness: sum(0..999) = 499500
var c = new Node();
var r = c.run(1000);
var corrOk = (c.sum === 499500 && r === 499500);
// a second independent accumulation
var d = new Node();
for(var i=0;i<100000;i++){ d.add(2); }
var corr2 = (d.sum === 200000);
document.title="MUT corrOk="+corrOk+" corr2="+corr2+" sum="+c.sum+" r="+r+" dsum="+d.sum;
</script></body></html>
