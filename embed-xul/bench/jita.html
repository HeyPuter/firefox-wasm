<!doctype html><html><head><meta charset=utf-8><title>start</title></head><body>
<script>
function asum(a,n){ var s=0; for(var i=0;i<n;i++){ s += a[i]; } return s; }
function aset(a,n){ for(var i=0;i<n;i++){ a[i]=i*2; } return a[n-1]; }
var A=[]; for(var i=0;i<1000;i++) A[i]=i;
for(var i=0;i<60;i++){ asum(A,1000); aset(A,1000); }  // warmup; leaves A[i]=i*2
var ok1=(asum(A,1000)===999000);     // sum(2i,0..999)=2*499500
var ok2=(aset(A,1000)===1998);       // a[999]=999*2
var t=performance.now(), s=0;
for(var k=0;k<5000;k++){ s=asum(A,1000); }
var gms=performance.now()-t;
var t2=performance.now();
for(var k=0;k<5000;k++){ aset(A,1000); }
var sms=performance.now()-t2;
var ok=ok1&&ok2&&(s===999000);
document.title="ARR ok="+ok+" getms="+gms.toFixed(1)+" setms="+sms.toFixed(1);
</script></body></html>
