<!doctype html>
<html><head><meta charset="utf-8"><title>Octane (wasm Gecko)</title></head>
<body>
<h1>Octane</h1>
<pre id="log">loading…</pre>
<script>
// Headless Octane runner for the wasm engine. Loads base.js + a selected set of
// benchmark files (default: a no-JIT-friendly core subset; ?b=a,b,c to override,
// ?b=full for everything), runs BenchmarkSuite.RunSuites, and POSTs the per-
// benchmark results + geometric-mean score back to the bench server.
//
// Octane score: higher = better (reference-relative throughput). Each benchmark
// self-times within fixed iterations, so inter-step event-loop latency does not
// distort the score (only total wall-clock).
var logEl = document.getElementById('log');
function logln(s) { logEl.textContent += s + '\n'; }

var CORE = ['richards','deltablue','crypto','raytrace','navier-stokes','regexp','splay','earley-boyer'];
var ALL = ['richards','deltablue','crypto','raytrace','earley-boyer','regexp','splay',
           'navier-stokes','pdfjs','mandreel','gbemu-part1','gbemu-part2','code-load',
           'box2d','zlib','zlib-data','typescript','typescript-input','typescript-compiler'];
var q = new URLSearchParams(location.search);
var sel = q.get('b');
var files = ['base'];
if (sel === 'full') files = files.concat(ALL);
else if (sel) files = files.concat(sel.split(','));
else files = files.concat(CORE);

function loadScript(name) {
  return new Promise(function (resolve, reject) {
    var s = document.createElement('script');
    s.src = 'octane/' + name + '.js';
    s.onload = resolve;
    s.onerror = function () { reject(new Error('load failed: ' + name)); };
    document.head.appendChild(s);
  });
}

function post(obj) {
  function send(n) {
    fetch('/bench-result', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(obj) }).catch(function () { if (n > 0) setTimeout(function () { send(n - 1); }, 400); });
  }
  send(6);
}

(async function () {
  try {
    for (var i = 0; i < files.length; i++) { logln('loading ' + files[i]); await loadScript(files[i]); }
  } catch (e) { logln('ERROR ' + e.message); post({ bench: 'octane', error: e.message }); return; }

  var results = {}, errors = {};
  // Mirror run.js config: no extra warmup/deterministic tweaks.
  BenchmarkSuite.config.doWarmup = undefined;
  BenchmarkSuite.config.doDeterministic = undefined;
  var t0 = Date.now();
  function titleUpdate() {
    var parts = [];
    for (var k in results) parts.push(k + '=' + Math.round(results[k]));
    var es = []; for (var k in errors) es.push(k);
    document.title = 'OCT ' + parts.join(' ') + (es.length ? (' ERR=' + es.join(',')) : '');
  }
  BenchmarkSuite.RunSuites({
    NotifyResult: function (name, result) { results[name] = +result; logln(name + ': ' + result); titleUpdate(); },
    NotifyError: function (name, error) { errors[name] = String(error); logln(name + ' ERROR ' + error); titleUpdate(); },
    NotifyScore: function (score) {
      logln('SCORE ' + score);
      document.title = 'OCTSCORE=' + Math.round(score) + ' ' + document.title.replace(/^OCT /, '');
      post({ bench: 'octane', files: files, score: +score, results: results, errors: errors,
             wallMs: Date.now() - t0, ua: navigator.userAgent });
    },
  });
})();
</script>
</body></html>
