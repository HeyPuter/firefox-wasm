<!doctype html><html><head><meta charset=utf-8><title>start</title></head><body>
<script>
// Exercises Mode V And/Or/Coalesce + JumpIf-on-value (ToBoolean). Each fn is
// non-mutating (Mode V) and warmed so it JITs; results must match plain JS.
function tand(a,b){ return a && b; }
function tor(a,b){ return a || b; }
function tco(a,b){ return a ?? b; }
function cond(a,b){ if (a && b) return 111; return 222; }   // && in a condition
function cor(a){ if (a || 0) return 1; return 2; }            // || in a condition
function chain(a,b,c){ return a && b && c; }                  // nested, depth-1 phi
function chain2(a,b,c){ return (a || b) && c; }
function tnot(a){ return !a; }
function isNull(x){ return x === null; }
function isUndef(x){ return x === undefined; }
function isTrue(x){ return x === true; }
function isFive(x){ return x === 5; }
function notNull(x){ return x !== null; }
function notFive(x){ return x !== 5; }
function ifNull(x){ if (x === null) return 1; return 2; }
// Mode V bitwise (reads object props -> Mode V, not Mode N).
function hashfn(b){ return ((b.a & 255) | (b.b << 4)) ^ (b.c >> 1); }
function notfn(b){ return ~b.a; }
function andneg(b){ return b.a & b.b; }

// TypeofEq + Mod (object reads -> Mode V). object/function typeof bails (fine).
function tofU(b){ return typeof b.v === "undefined"; }
function tofN(b){ return typeof b.v === "number"; }
function tofS(b){ return typeof b.v === "string"; }
function tofB(b){ return typeof b.v === "boolean"; }
function tofNeN(b){ return typeof b.v !== "number"; }
function modfn(b){ return b.a % b.b; }
function getStr(x){ return x ? "yes" : "no"; }       // string literals + JumpIf-on-value
function pickStr(x){ if (x > 0) return "pos"; return "neg"; }
function constStr(){ return "hello"; }
function len(x){ return x.length; }                  // .length on string OR array
function scat(n){ var s=""; for(var i=0;i<n;i++){ s = s + "x"; } return s.length; }  // concat-in-loop

var o={}, p={};
var bo={a:5,b:3,c:16}, bn={a:-1,b:5,c:7};
var ou={v:undefined}, on={v:5}, os={v:"x"}, ob={v:true}, om={a:7,b:3};
for(var i=0;i<300000;i++){ tand(1,2); tor(0,5); tco(null,7); cond(1,1); cor(3); chain(1,2,3); chain2(0,2,4); tnot(0); tnot(5);
  isNull(null); isUndef(0); isTrue(true); isFive(5); notNull(1); notFive(6); ifNull(null);
  hashfn(bo); notfn(bo); andneg(bn);
  tofU(ou); tofN(on); tofS(os); tofB(ob); tofNeN(on); modfn(om);
  getStr(1); getStr(0); pickStr(5); constStr(); len("hello"); len([1,2,3]); scat(8); }

var n=0, pass=0;
function chk(cond){ n++; if(cond) pass++; }
chk(tand(3,4)===4); chk(tand(0,4)===0); chk(tand(5,0)===0);
chk(tor(0,9)===9); chk(tor(7,9)===7); chk(tor(o,5)===o);
chk(tco(null,7)===7); chk(tco(undefined,8)===8); chk(tco(0,8)===0); chk(tco(false,8)===false);
chk(cond(1,1)===111); chk(cond(1,0)===222); chk(cond(0,1)===222);
chk(cor(3)===1); chk(cor(0)===2);
chk(chain(1,2,3)===3); chk(chain(1,0,3)===0); chk(chain(0,2,3)===0);
chk(chain2(0,2,4)===4); chk(chain2(0,0,4)===0); chk(chain2(5,2,4)===4);
var r=tand(NaN,5); chk(r!==r);                 // NaN falsy -> returns NaN
chk(tand(o,5)===5); chk(tor(0,p)===p);         // object truthy
chk(tand("x",5)===5); chk(tor("",9)===9);      // strings: ToBool deopts -> interp, still correct
chk(tand(true,7)===7); chk(tor(false,0)===0); chk(tand(false,7)===false);
chk(tnot(0)===true); chk(tnot(5)===false); chk(tnot(null)===true);
chk(tnot(o)===false); chk(tnot(NaN)===true); chk(tnot("")===true); chk(tnot("x")===false);
chk(isNull(null)===true); chk(isNull(0)===false); chk(isNull(undefined)===false); chk(isNull(o)===false);
chk(isUndef(undefined)===true); chk(isUndef(null)===false); chk(isUndef(0)===false);
chk(isTrue(true)===true); chk(isTrue(1)===false); chk(isTrue(false)===false);
chk(isFive(5)===true); chk(isFive(6)===false); chk(isFive(5.5)===false); chk(isFive("5")===false); chk(isFive(NaN)===false);
chk(notNull(null)===false); chk(notNull(1)===true); chk(notFive(5)===false); chk(notFive(6)===true);
chk(ifNull(null)===1); chk(ifNull(3)===2);
chk(hashfn(bo)===(((5&255)|(3<<4))^(16>>1))); chk(notfn(bo)===~5); chk(andneg(bn)===(-1&5));
chk(andneg({a:-1,b:-1})===-1); chk(notfn({a:0})===-1);
chk(tofU(ou)===true); chk(tofU(on)===false); chk(tofU({v:null})===false);
chk(tofN(on)===true); chk(tofN({v:5.5})===true); chk(tofN(os)===false); chk(tofN({v:NaN})===true);
chk(tofS(os)===true); chk(tofS(on)===false);
chk(tofB(ob)===true); chk(tofB(on)===false);
chk(tofNeN(on)===false); chk(tofNeN(os)===true);
chk(modfn(om)===1); chk(modfn({a:-7,b:3})===-1); chk(modfn({a:7,b:-3})===1); chk(modfn({a:8,b:4})===0);
chk(modfn({a:5.5,b:2})===1.5); var mz=modfn({a:7,b:0}); chk(mz!==mz);
chk(getStr(1)==="yes"); chk(getStr(0)==="no"); chk(pickStr(5)==="pos"); chk(pickStr(-3)==="neg");
chk(constStr()==="hello"); chk(typeof getStr(1)==="string"); chk(getStr("")==="no");
chk(len("hello")===5); chk(len("")===0); chk(len("ab")===2);
chk(len([1,2,3])===3); chk(len([])===0); chk(len([1,2,3,4,5])===5);
chk(scat(8)===8); chk(scat(0)===0); chk(scat(20)===20);

document.title="LOGIC pass="+pass+"/"+n;
</script></body></html>
