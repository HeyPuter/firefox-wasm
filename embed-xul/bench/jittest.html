<!doctype html><html><head><meta charset=utf-8><title>start</title></head><body>
<script>
function f(a,b){ return a*b + a - b; }
function g(a){ var x; return x + a; }
function sum(n){ var s=0; for (var i=0;i<n;i++) s+=i; return s; }
function poly(n){ var s=0,i=0; while(i<n){ s = s + i*i - i; i++; } return s; }
function hash(n){ var h=0; for(var i=0;i<n;i++){ h=(h*31+i)|0; h=h^(h>>13); h=(h+(h<<7))|0; } return h|0; }
function getsum(o){ return o.x + o.y + o.z; }
function vsum(o,n){ var s=0; for(var i=0;i<n;i++){ s += o.x + o.y + o.z; } return s; }

var ok=true, bad="";
function chk(c,m){ if(!c&&ok){ok=false;bad=m;} }
function polyRef(n){var s=0;for(var i=0;i<n;i++)s+=i*i-i;return s;}
function hashRef(n){var h=0;for(var i=0;i<n;i++){h=(h*31+i)|0;h=h^(h>>13);h=(h+(h<<7))|0;}return h|0;}

for (var i=0;i<60;i++){ f(3,4); sum(50); poly(40); hash(50); }
chk(f(3,4)===11,"f");
chk(sum(1000)===499500,"sum="+sum(1000));
chk(poly(200)===polyRef(200),"poly");
chk(hash(500)===hashRef(500),"hash="+hash(500)+" ref="+hashRef(500));
chk(hash(123)===hashRef(123),"hash123");

var gCold=g(5); for(var i=0;i<40;i++) g(5); var gWarm=g(5);
chk(gWarm!==gWarm,"uninit_local g(5)="+gWarm);  // var x undefined => x+5 = NaN (NaN!==NaN)

var t0=performance.now(), acc=0;
for (var i=0;i<20000;i++) acc += sum(2000);
var sms=performance.now()-t0;
var t1=performance.now(), h=0;
for (var i=0;i<20000;i++) h ^= hash(2000);
var hms=performance.now()-t1;

// Property-access (Mode V) kernel: getsum is straight-line with 3 inline GetProps.
var OBJ={x:3,y:5,z:7};
for (var i=0;i<60;i++) getsum(OBJ);
var pCold=getsum(OBJ);
chk(pCold===15,"getsum="+pCold);
var t2=performance.now(), pacc=0;
for (var i=0;i<1000000;i++) pacc += getsum(OBJ);
var pms=performance.now()-t2;
chk(pacc===15000000,"pacc="+pacc);

// Property-access LOOP (Mode V + control flow): the whole loop runs in ONE wasm
// call with inline GetProps, amortizing the guest<->host boundary.
for (var i=0;i<60;i++) vsum(OBJ,50);
chk(vsum(OBJ,1000)===15000,"vsum="+vsum(OBJ,1000));
var t3=performance.now();
var vr=vsum(OBJ,1000000);
var vms=performance.now()-t3;
chk(vr===15000000,"vr="+vr);

document.title="JIT ok="+ok+" engaged="+(sms<500)+
  " hash500="+hash(500)+" sumloopms="+sms.toFixed(1)+" hashloopms="+hms.toFixed(1)+
  " propms="+pms.toFixed(1)+" vsumms="+vms.toFixed(1)+(bad?(" BAD "+bad):"");
</script></body></html>
