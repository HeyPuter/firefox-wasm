<!doctype html><html><head><meta charset=utf-8><title>start</title></head><body>
<script>
// String OPERATIONS. These are non-mutating + call-free, so a string operand makes
// Mode V deopt; the adaptive forceVS path should recompile to Mode VS, whose Add/
// StrictEq/Lt helpers (AddValues/StrictlyEqual/...) implement full JS string semantics
// over the GC-traced frame. Testing whether that ALREADY works (correct + no crash).
function concat(a,b){ return a + b; }
function eq(a,b){ return a === b; }
function ne(a,b){ return a !== b; }
function lt(a,b){ return a < b; }
function cat3(a,b,c){ return a + b + c; }
function mixed(a,n){ return a + n; }              // string + number -> "..N"

// warm hard to push past the forceVS threshold (6 consec deopts)
for(var i=0;i<400000;i++){
  concat("foo","bar"); eq("x","x"); ne("a","b"); lt("a","b"); cat3("a","b","c"); mixed("v",5);
}
var n=0, pass=0;
function chk(c){ n++; if(c) pass++; }
chk(concat("foo","bar")==="foobar");
chk(concat("","x")==="x");
chk(eq("hello","hello")===true);
chk(eq("hello","world")===false);
chk(eq("a","ab")===false);
chk(ne("a","b")===true);
chk(ne("x","x")===false);
chk(lt("a","b")===true);
chk(lt("b","a")===false);
chk(cat3("a","b","c")==="abc");
chk(mixed("v",5)==="v5");
chk(concat("num",42)==="num42");
// dynamic (non-literal) strings: build via concat then re-use
var d = concat("dy","na");
chk(d==="dyna");
chk(eq(d, "dyna")===true);          // non-atom === atom: content compare
chk(concat(d,"mic")==="dynamic");

document.title="STR pass="+pass+"/"+n;
</script></body></html>
