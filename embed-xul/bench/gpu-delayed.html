<!doctype html>
<html><head><meta charset="utf-8"><title>gpu delayed change</title></head>
<body id="b" style="margin:0;background:#ffffff">
<div id="t" style="font:40px sans-serif;padding:40px">before</div>
<script>
// Start white/"before". After 1500ms (well past the static settle window), make a
// big visible one-shot change: solid red background + new text. This change is
// driven by the guest's own timer -> refresh driver tick. It tests that gpu_present's
// idle skip still composites a delayed one-shot change (the polling-race concern):
// if the skip wrongly suppresses it, the canvas stays white.
setTimeout(function () {
  document.getElementById('b').style.background = '#ff0000';
  document.getElementById('t').textContent = 'AFTER';
}, 1500);
</script>
</body></html>
