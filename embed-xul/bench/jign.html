<script>
function fib(n){ if(n<2) return n; return fib(n-1)+fib(n-2); }
function sq(x){ return x*x; }
function sqsum(n){ var s=0; for(var i=0;i<n;i++){ s += sq(i); } return s; }
for(var i=0;i<60;i++){ fib(12); sqsum(50); }
var ok1=(fib(20)===6765);
var ok2=(sqsum(1000)===332833500);
var t=performance.now(); var f=fib(28); var fms=performance.now()-t;
var t2=performance.now(), ss=0; for(var k=0;k<3000;k++){ ss=sqsum(1000); } var sms=performance.now()-t2;
var ok=ok1&&ok2&&(f===317811)&&(ss===332833500);
document.title="GN ok="+ok+" fib="+f+" fibms="+fms.toFixed(1)+" gcallms="+sms.toFixed(1);
</script></body></html>
