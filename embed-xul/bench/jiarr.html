<!doctype html><html><head><meta charset=utf-8><title>start</title></head><body>
<script>
// Mode VS SetElem soundness: a[i] = a[i] + 1 (read-modify-write on a dense array).
function fill(a,n){ for(var i=0;i<n;i++){ a[i] = a[i] + 1; } }
var A = new Array(1000); for(var i=0;i<1000;i++) A[i]=0;
for(var w=0;w<300;w++){ fill(A, 1000); }   // warm to the JIT; each fill +1 to all
var warmOk = (A[0] === 300 && A[999] === 300);
// fresh array, known expected: B[i] = i + 1000 after 1000 fills
var B = new Array(100); for(var i=0;i<100;i++) B[i]=i;
for(var k=0;k<1000;k++){ fill(B, 100); }
var corrOk = (B[0]===1000 && B[50]===1050 && B[99]===1099);
// timing (5000 fills of 1000 = 5M SetElem r/m/w)
var t=performance.now();
for(var k=0;k<5000;k++){ fill(A, 1000); }
var ms=performance.now()-t;
document.title="ARR warmOk="+warmOk+" corrOk="+corrOk+" A0="+A[0]+" B50="+B[50]
  +" arrms="+ms.toFixed(1);
</script></body></html>
