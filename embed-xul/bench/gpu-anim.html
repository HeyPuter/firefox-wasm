<!doctype html>
<html><head><meta charset="utf-8"><title>gpu anim</title>
<style>.b{position:absolute;width:60px;height:60px;border-radius:8px}</style></head>
<body style="margin:0;overflow:hidden;background:#fff">
<div id="root"></div>
<script>
// Continuous animation: 120 absolutely-positioned boxes moved every rAF tick via
// transform. WebRender recomposites every frame (each frame is a real change), so
// this is the ACTIVE-rendering case where the per-GL-call proxy tax recurs every
// frame -- the cost an OffscreenCanvas (render-thread-local GL) would remove.
var root = document.getElementById('root'), boxes = [];
for (var i = 0; i < 120; i++) {
  var d = document.createElement('div');
  d.className = 'b';
  d.style.background = 'hsl(' + (i * 3 % 360) + ',70%,55%)';
  root.appendChild(d); boxes.push(d);
}
var t = 0;
function frame() {
  t += 0.03;
  for (var i = 0; i < boxes.length; i++) {
    var x = 400 + 360 * Math.cos(t + i * 0.3);
    var y = 280 + 240 * Math.sin(t * 1.3 + i * 0.5);
    boxes[i].style.transform = 'translate(' + x + 'px,' + y + 'px) rotate(' + (t * 50 + i) + 'deg)';
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body></html>
