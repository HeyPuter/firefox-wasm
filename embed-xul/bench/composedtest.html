<!doctype html><html><head><meta charset=utf-8><style>body{font-family:sans-serif;margin:16px}h2{margin:6px 0}</style></head>
<body>
<h2>composed walk test</h2>
<div>LIGHT: <img id=li width=40 height=40 style="vertical-align:middle"></div>
<my-box></my-box>
<iframe id=fr style="width:240px;height:70px;border:2px solid blue;display:block;margin-top:8px"></iframe>
<script>
function svg(color,label){ return 'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="'+color+'"/><text x="4" y="27" fill="white" font-size="18" font-family="sans-serif">'+label+'</text></svg>'); }
document.getElementById('li').src=svg('red','L');
class B extends HTMLElement{ constructor(){ super(); var r=this.attachShadow({mode:'open'});
  var sheet=new CSSStyleSheet(); sheet.replaceSync('.lbl{color:purple;font-weight:bold;font-size:18px}');
  r.adoptedStyleSheets=[sheet];
  r.innerHTML='<div style="margin:8px 0"><span class=lbl>SHADOW:</span> <img id=si width=40 height=40 style="vertical-align:middle"> <canvas id=sc width=54 height=40 style="vertical-align:middle"></canvas></div>';
  r.getElementById('si').src=svg('green','S');
  var cx=r.getElementById('sc').getContext('2d'); cx.fillStyle='orange'; cx.fillRect(0,0,54,40); cx.fillStyle='#000'; cx.font='16px sans-serif'; cx.fillText('CV',10,26);
} }
customElements.define('my-box', B);
var f=document.getElementById('fr');
f.srcdoc='<body style="margin:6px;font-family:sans-serif"><b>FRAME:</b> <img id=fi width=40 height=40 style="vertical-align:middle"></body>';
f.addEventListener('load',function(){ try{ f.contentDocument.getElementById('fi').src=svg('blue','F'); }catch(e){} });
</script>
</body></html>
