name: build-and-release

# Builds the full Gecko->wasm engine and the embed-xul web build, then attaches
# the runtime artifacts (gecko.{js,wasm,data} + index.html + server.cjs) to a
# GitHub Release.
#
# !!! HEAVY BUILD — READ FIRST !!!
# A full Gecko->wasm build is enormous: ~26 GB objdir, a ~3.7 GB libxul.so, a
# ~245 MB gecko.wasm, and 25-50 min on 12 cores. On a standard hosted runner
# (4 vCPU / 16 GB RAM / ~14 GB free disk) this is marginal on ALL THREE axes:
#   - disk: we free ~30 GB below; still tight. Prefer a larger/self-hosted runner.
#   - ram:  the final emcc link of a 245 MB module can spike; 16 GB may OOM.
#   - time: on 4 vCPU expect ~2-4 h (job cap is 6 h).
# If it doesn't fit, switch `runs-on` to a larger runner (e.g. a self-hosted one
# or GitHub larger runners) — the steps are otherwise unchanged.
#
# This workflow is a STARTING POINT and has not been run in CI; the toolchain
# pins and the libclang step in particular may need iteration.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create releases / upload assets

env:
  EMSDK_VERSION: '3.1.56'        # emcc 3.1.56 / clang 19 (must match the port)
  BINARYEN_VERSION: '129'        # newer than emsdk's bundled v117 (rust LLVM21 wasm features)
  RUST_VERSION: '1.95.0'
  MOZBUILD_STATE_PATH: ${{ github.workspace }}/.mozbuild
  MACH_NO_TERMINAL_FOOTER: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout (with the firefox/ engine submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free up disk space (Gecko objdir is ~26 GB)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Install build prerequisites (clang/libclang for bindgen, etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm-dev libclang-dev python3 mercurial unzip
          echo "LIBCLANG_LIBDIR=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Set up emsdk ${{ env.EMSDK_VERSION }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}

      - name: Set up binaryen v${{ env.BINARYEN_VERSION }} (wasm-opt)
        run: |
          curl -sL "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" \
            | tar xz
          echo "${GITHUB_WORKSPACE}/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Set up Rust ${{ env.RUST_VERSION }} (+ rust-src, wasm target)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rust-src
          targets: wasm32-unknown-emscripten

      - name: Recreate the binaryen shim (em_config BINARYEN_ROOT)
        run: |
          mkdir -p toolchain/binaryen/bin
          ln -sf "$EMSDK/upstream/bin/"* toolchain/binaryen/bin/ 2>/dev/null || true
          ln -sf "$(command -v wasm-opt)" toolchain/binaryen/bin/wasm-opt
          wasm-opt --version

      - name: Generate em_config for this runner (paths are machine-specific)
        run: |
          cat > em_config <<EOF
          import os
          emsdk_path = os.environ['EMSDK']
          NODE_JS = '$(command -v node)'
          LLVM_ROOT = emsdk_path + '/upstream/bin'
          BINARYEN_ROOT = '${GITHUB_WORKSPACE}/toolchain/binaryen'
          EMSCRIPTEN_ROOT = emsdk_path + '/upstream/emscripten'
          EOF
          cat em_config

      - name: Rewrite mozconfig absolute paths for this runner
        run: |
          sed -i \
            -e "s#/home/velzie/src/gecko-wasm#${GITHUB_WORKSPACE}#g" \
            -e "s#--with-libclang-path=/home/velzie/.mozbuild/clang/lib#--with-libclang-path=${LIBCLANG_LIBDIR}#g" \
            -e "s#/home/velzie/.mozbuild#${MOZBUILD_STATE_PATH}#g" \
            mozconfig.full.emscripten
          grep -nE 'MOZ_OBJDIR|libclang|CFLAGS' mozconfig.full.emscripten

      - name: Vendor the Rust std dependency crates (gitignored, build-std inputs)
        run: python3 vendor-std-deps.py

      - name: Configure + build the engine (long)
        run: |
          cd firefox
          export EM_CONFIG="${GITHUB_WORKSPACE}/em_config"
          export MOZCONFIG="${GITHUB_WORKSPACE}/mozconfig.full.emscripten"
          ./mach configure
          ./mach build

      - name: Stage GRE + relink the web embedder
        run: |
          bash embed-xul/stage-gre.sh
          bash embed-xul/restrip-relink-web.sh

      - name: Package the runtime artifacts
        run: |
          mkdir -p dist/gecko-wasm
          cp embed-xul/index.html embed-xul/server.cjs \
             embed-xul/gecko.js embed-xul/gecko.wasm embed-xul/gecko.data \
             dist/gecko-wasm/
          cat > dist/gecko-wasm/README.txt <<'TXT'
          gecko-wasm runtime build.
          Serve with COOP/COEP (required for SharedArrayBuffer): `npm i wisp-server-node && node server.cjs`,
          then open the printed http://127.0.0.1:<port>/ in Chromium.
          TXT
          tar -C dist -czf gecko-wasm-${{ github.ref_name }}.tar.gz gecko-wasm
          ls -la gecko-wasm-*.tar.gz

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: gecko-wasm-${{ github.ref_name }}
          path: gecko-wasm-*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: gecko-wasm-*.tar.gz
          generate_release_notes: true
