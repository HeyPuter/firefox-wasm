name: build-and-release

# Builds the full Gecko->wasm engine and the embed-xul web build, then attaches
# the runtime artifacts (gecko.{js,wasm,data} + index.html + server.cjs) to a
# GitHub Release.
#
# !!! HEAVY BUILD — READ FIRST !!!
# A full Gecko->wasm build is enormous: ~26 GB objdir, a ~3.7 GB libxul.so, a
# ~245 MB gecko.wasm, and 25-50 min on 12 cores. On a standard hosted runner
# (4 vCPU / 16 GB RAM / ~14 GB free disk) this is marginal on ALL THREE axes:
#   - disk: we free ~30 GB below; still tight. Prefer a larger/self-hosted runner.
#   - ram:  the final emcc relink (wasm-opt over the 245 MB module) + engine LTO link
#           spike past 16 GB and OOM-kill, so we add a 32 GB swapfile on /mnt below.
#   - time: on 4 vCPU expect ~2-4 h (job cap is 6 h).
# If it doesn't fit, switch `runs-on` to a larger runner (e.g. a self-hosted one
# or GitHub larger runners) — the steps are otherwise unchanged.
#
# This workflow is a STARTING POINT and has not been run in CI; the toolchain
# pins and the libclang step in particular may need iteration.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create releases / upload assets

env:
  EMSDK_VERSION: '3.1.56'        # emcc 3.1.56 / clang 19 (must match the port)
  BINARYEN_VERSION: '129'        # newer than emsdk's bundled v117 (rust LLVM21 wasm features)
  RUST_VERSION: '1.95.0'
  MOZBUILD_STATE_PATH: ${{ github.workspace }}/.mozbuild
  MACH_NO_TERMINAL_FOOTER: '1'

jobs:
  build:
    runs-on: firefox
    timeout-minutes: 350
    steps:
      - name: Checkout the embedder + build harness (this repo)
        uses: actions/checkout@v4

      # - name: Free up disk space (Gecko objdir is ~26 GB)
      #   uses: jlumbroso/free-disk-space@main
      #   with:
      #     tool-cache: true
      #     android: true
      #     dotnet: true
      #     haskell: true
      #     large-packages: true
      #     swap-storage: true 

      - name: Install build prerequisites (clang/libclang for bindgen, etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm-dev libclang-dev libpulse-dev python3 mercurial unzip zstd
          # mozconfig.full.emscripten reads $LIBCLANG_PATH for --with-libclang-path.
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Set up emsdk ${{ env.EMSDK_VERSION }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}

      # emsdk's bundled binaryen (v117) rejects rust/LLVM's newer wasm features, so
      # pull a complete recent binaryen for wasm-opt. setup-binaryen fetches the
      # WebAssembly/binaryen release (tag version_<N>) and puts <root>/bin on PATH.
      - name: Set up binaryen v${{ env.BINARYEN_VERSION }} (>= v117; for wasm-opt)
        uses: Aandreba/setup-binaryen@v1.0.0
        with:
          version: ${{ env.BINARYEN_VERSION }}   # -> release tag version_129
          token: ${{ secrets.GITHUB_TOKEN }}     # required input (release API)

      - name: Point emscripten at the installed binaryen
        run: |
          # em_config reads $EM_BINARYEN_ROOT and expects $EM_BINARYEN_ROOT/bin/wasm-opt.
          # setup-binaryen only adds <root>/bin to PATH (no path output), so derive
          # the root from wasm-opt's location wherever the tool-cache placed it.
          ROOT="$(dirname "$(dirname "$(command -v wasm-opt)")")"
          echo ">> binaryen root: $ROOT"; wasm-opt --version
          echo "EM_BINARYEN_ROOT=$ROOT" >> "$GITHUB_ENV"

      - name: Set up Rust ${{ env.RUST_VERSION }} (+ rust-src, wasm target)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rust-src
          targets: wasm32-unknown-emscripten

      # em_config is committed and portable (reads $EMSDK + $EM_BINARYEN_ROOT), so
      # no shim or config generation is needed here.

      - name: Clone the pinned Gecko engine fork (depth 1)
        run: make firefox

      # No path rewriting needed: mozconfig.full.emscripten derives its objdir and
      # FreeType include from $topsrcdir, and libclang from $LIBCLANG_PATH (set above).

      - name: "Build (release: engine LTO + zstd; wasm-opt TEMPORARILY disabled) — long"
        env:
          NO_WASM_OPT: '1'   # TEMP: skip the whole-module wasm-opt pass (OOMs/SIGSEGVs in CI); remove to re-enable
        run: |
          # wasm-opt's recursive passes overflow the default 8MB stack on the
          # ~250MB module and die with SIGSEGV. Raise the stack limit for the
          # whole make -> em++ -> wasm-opt subprocess tree (ulimit is inherited).
          ulimit -s unlimited || ulimit -s 524288 || true
          make release   # firefox cloned; runs vendor -> mach build (LTO) -> relink -> zstd

      - name: Show link errors on failure
        if: failure()
        run: |
          echo "=== embed-xul/link.err (tail) ==="
          tail -n 60 embed-xul/link.err 2>/dev/null || echo "(no link.err)"

      - name: Package the runtime artifacts (compressed)
        run: |
          mkdir -p dist/gecko-wasm
          # Release ships the zstd-compressed wasm/data + the zstddec decompressor;
          # index.html reads gecko-assets.json and decompresses in-browser.
          cp embed-xul/index.html embed-xul/server.cjs embed-xul/zstddec.js \
             embed-xul/gecko.js embed-xul/gecko.worker.js \
             embed-xul/gecko.wasm.zst embed-xul/gecko.data.zst embed-xul/gecko-assets.json \
             dist/gecko-wasm/
          cat > dist/gecko-wasm/README.txt <<'TXT'
          gecko-wasm runtime build (zstd-compressed; decompressed in-browser via zstddec).
          Serve with COOP/COEP (required for SharedArrayBuffer): `npm i wisp-server-node && node server.cjs`,
          then open the printed http://127.0.0.1:<port>/ in Chromium.
          TXT
          tar -C dist -czf gecko-wasm-${{ github.ref_name }}.tar.gz gecko-wasm
          ls -la gecko-wasm-*.tar.gz

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: gecko-wasm-${{ github.ref_name }}
          path: gecko-wasm-*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: gecko-wasm-*.tar.gz
          generate_release_notes: true
