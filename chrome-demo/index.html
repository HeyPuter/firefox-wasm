<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>libxul.js — chrome demo</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #17191c; color: #f7f7f5; }
    header { padding: 8px 12px; background: #f3f3f3; border-bottom: 1px solid #ddd; }
    #screen { display: none; border: 1px solid #343941; image-rendering: pixelated; background: #fff; outline: none; }
    #screen.ready { display: block; }
    #splash {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    #splash.done { display: none; }
    .splash-panel {
      width: min(520px, 100%);
    }
    .splash-title {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .splash-status {
      margin: 0 0 18px;
      color: #c8ced8;
      font-size: 14px;
      min-height: 20px;
    }
    .progress-track {
      height: 10px;
      overflow: hidden;
      background: #2d333b;
      border: 1px solid #46505c;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #6bd1ff;
      transition: width 120ms ease;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 8px;
      color: #aab3c0;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .console-box {
      margin-top: 18px;
      height: 180px;
      overflow: auto;
      padding: 10px 12px;
      box-sizing: border-box;
      background: #0f1115;
      border: 1px solid #343b45;
      color: #d9e0ea;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .console-line { margin: 0; }
    .console-line.log { color: #cfd7e3; }
    .console-line.warn { color: #ffd166; }
    .console-line.error { color: #ff7b72; }
    .console-prefix {
      color: #7d8794;
      user-select: none;
    }
    .splash-controls {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px 20px;
    }
    .splash-controls label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #d9e0ea;
      font-size: 13px;
      user-select: none;
      cursor: pointer;
    }
    .splash-controls .wisp-field {
      flex: 1 1 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
    }
    .splash-controls .wisp-field input {
      flex: 1;
      padding: 6px 8px;
      background: #0f1115;
      border: 1px solid #46505c;
      color: #f7f7f5;
      font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      border-radius: 3px;
    }
    .splash-controls .hint {
      width: 100%;
      margin: -4px 0 0;
      color: #7d8794;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <section id="splash" aria-live="polite">
    <div class="splash-panel">
      <h1 class="splash-title">Firefox front-end</h1>
      <p id="splash-status" class="splash-status">Preparing chrome assets</p>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div class="progress-meta">
        <span id="progress-phase">Checking</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="splash-controls">
        <label><input type="checkbox" id="opt-gpu" /> Use GPU acceleration</label>
        <label><input type="checkbox" id="opt-jit" /> Enable JIT</label>
        <label class="wisp-field">WISP server <input type="text" id="opt-wisp" spellcheck="false" autocomplete="off" /></label>
        <p class="hint">Changing an option reloads the page to apply it.</p>
      </div>
      <div id="console-output" class="console-box" role="log" aria-label="Startup console output"></div>
    </div>
  </section>
  <canvas id="screen" width="1024" height="768" tabindex="0"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
